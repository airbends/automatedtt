{% extends "base.html" %}

{% block title %}Delete {{ room_type_singular }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h2><i class="fa-solid fa-triangle-exclamation me-2 text-danger"></i>Delete {{ room_type_singular }}</h2>
    <p>Are you sure you want to delete <strong>{{ object.room_number }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="fa-solid fa-trash me-1"></i>Delete</button>
        <a href="{% url list_url_name %}" class="btn btn-secondary"><i class="fa-solid fa-xmark me-1"></i>Cancel</a>
    </form>
</div>
{% endblock %}
