{% extends "base.html" %}

{% block title %}{% if form.instance.pk %}Edit Semester{% else %}Add Semester{% endif %}{% endblock %}

{% block content %}
<div class="container py-4">
    <h2>
        <i class="fa-regular fa-calendar-days me-2 text-primary"></i>
        {% if form.instance.pk %}Edit{% else %}Add{% endif %} Semester
    </h2>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary"><i class="fa-regular fa-floppy-disk me-1"></i>Save</button>
        <a href="{% if form.instance.pk %}{% url 'scheduler:course_detail' form.instance.course.pk %}{% else %}{% url 'scheduler:course_list' %}{% endif %}" class="btn btn-secondary"><i class="fa-solid fa-xmark me-1"></i>Cancel</a>
    </form>
</div>
{% endblock %}
